<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER / GREETING -->
  <header class="header">
    <div class="header-top">
      <div class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
        <span class="theme-icon">&#x1F319;</span>
      </div>
    </div>
    <div class="greeting-section">
      <div class="datetime" id="datetime"></div>
      <h1 class="greeting" id="greeting"></h1>
      <div class="name-row">
        <span id="displayName" class="display-name"></span>
        <button class="btn-icon" id="editNameBtn" title="Change name">&#x270F;&#xFE0F;</button>
      </div>
    </div>
    <!-- Name modal -->
    <div class="modal-overlay" id="nameModal">
      <div class="modal">
        <h2>What is your name?</h2>
        <input type="text" id="nameInput" class="modal-input" placeholder="Enter your name..." maxlength="40" />
        <div class="modal-actions">
          <button class="btn btn-primary" id="saveNameBtn">Save</button>
          <button class="btn btn-secondary" id="cancelNameBtn">Cancel</button>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-grid">

    <!-- FOCUS TIMER -->
    <section class="card timer-card">
      <h2 class="card-title">&#x23F1; Focus Timer</h2>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-duration-row">
        <label for="timerMinutes">Set minutes:</label>
        <input type="number" id="timerMinutes" class="timer-input" min="1" max="99" value="25" />
        <button class="btn btn-secondary btn-sm" id="applyTimerBtn">Apply</button>
      </div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="startBtn">Start</button>
        <button class="btn btn-secondary" id="stopBtn" disabled>Stop</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
      </div>
      <p class="timer-status" id="timerStatus">Ready to focus!</p>
    </section>

    <!-- TO-DO LIST -->
    <section class="card todo-card">
      <div class="card-header">
        <h2 class="card-title">&#x2705; To-Do List</h2>
        <div class="todo-controls">
          <select id="sortSelect" class="sort-select">
            <option value="default">Sort: Default</option>
            <option value="az">Sort: A to Z</option>
            <option value="za">Sort: Z to A</option>
            <option value="done">Sort: Done last</option>
          </select>
        </div>
      </div>
      <div class="todo-input-row">
        <input type="text" id="taskInput" class="task-input" placeholder="Add a new task..." maxlength="120" />
        <button class="btn btn-primary" id="addTaskBtn">Add</button>
      </div>
      <p class="todo-error" id="todoError"></p>
      <ul class="task-list" id="taskList"></ul>
      <p class="empty-state" id="emptyTodo">No tasks yet. Add one above!</p>
    </section>

    <!-- QUICK LINKS -->
    <section class="card links-card">
      <h2 class="card-title">&#x1F517; Quick Links</h2>
      <div class="link-input-group">
        <input type="text" id="linkName" class="link-field" placeholder="Label (e.g. YouTube)" maxlength="30" />
        <input type="url" id="linkUrl" class="link-field" placeholder="URL (e.g. https://youtube.com)" />
        <button class="btn btn-primary" id="addLinkBtn">Add</button>
      </div>
      <p class="todo-error" id="linkError"></p>
      <div class="link-grid" id="linkGrid"></div>
      <p class="empty-state" id="emptyLinks">No links yet. Add your favorites!</p>
    </section>

  </main>

  <!-- Edit task modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2>Edit Task</h2>
      <input type="text" id="editTaskInput" class="modal-input" maxlength="120" />
      <div class="modal-actions">
        <button class="btn btn-primary" id="saveEditBtn">Save</button>
        <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
